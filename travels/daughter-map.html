<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>行万里路 - 小豹子的足迹地图</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f5f5; }
    nav {
      background: #2c3e50;
      color: white;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 24px;
      height: 48px;
    }
    nav .brand { font-size: 1rem; font-weight: bold; color: white; text-decoration: none; }
    nav a {
      color: #bdc3c7;
      text-decoration: none;
      font-size: 0.875rem;
      padding: 4px 8px;
      border-radius: 4px;
      transition: background 0.2s;
    }
    nav a:hover { background: rgba(255,255,255,0.1); color: white; }
    nav a.active { color: white; background: rgba(255,255,255,0.15); }
    #subheader {
      background: #34495e;
      color: #ecf0f1;
      padding: 10px 24px;
      font-size: 0.82rem;
    }
    #map { height: calc(100vh - 118px); width: 100%; }
    #legend {
      background: white;
      padding: 8px 16px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      font-size: 0.8rem;
      border-top: 1px solid #ddd;
      align-items: center;
    }
    #legend span { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
    .popup-wrap { min-width: 180px; }
    .popup-title { font-weight: bold; font-size: 1rem; margin-bottom: 6px; }
    .popup-row {
      display: flex; gap: 6px; font-size: 0.82rem;
      color: #444; margin-bottom: 3px; align-items: flex-start;
    }
    .popup-label { color: #888; white-space: nowrap; flex-shrink: 0; }
    .popup-category { font-size: 0.75rem; margin-top: 6px; padding-top: 6px; border-top: 1px solid #eee; }
  </style>
</head>
<body>
  <nav>
    <a class="brand" href="../README.md">🌐 Paco Agents</a>
    <a href="../travels/History.md">旅行记录</a>
    <a href="map.html">🗺️ Paco 的足迹</a>
    <a href="dad-map.html">🗺️ 爸爸的足迹</a>
    <a href="mom-map.html">🗺️ 妈妈的足迹</a>
    <a href="cherry-map.html">🗺️ Cherry 的足迹</a>
    <a href="#" class="active">🗺️ 小豹子的足迹</a>
  </nav>
  <div id="subheader">行万里路 · 小豹子的足迹地图 &nbsp;|&nbsp; 点击标记查看详情</div>
  <div id="map"></div>
  <div id="legend">
    <strong>图例：</strong>
    <span><span class="legend-dot" style="background:#e74c3c;"></span>居住地</span>
    <span><span class="legend-dot" style="background:#3498db;"></span>国内旅行</span>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([32, 116], 5);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 18
    }).addTo(map);

    // Categories: "home" = home/birthplace, "domestic" = domestic travel
    const COLORS = { home: '#e74c3c', domestic: '#3498db' };

    function makeIcon(color) {
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="36" viewBox="0 0 24 36">
        <path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 24 12 24s12-15 12-24C24 5.4 18.6 0 12 0z"
              fill="${color}" stroke="white" stroke-width="1.5"/>
        <circle cx="12" cy="12" r="5" fill="white"/>
      </svg>`;
      return L.divIcon({
        html: svg,
        iconSize: [24, 36],
        iconAnchor: [12, 36],
        popupAnchor: [0, -36],
        className: ''
      });
    }

    // Each place: name, lat, lng, country, firstVisitDate, notes, category
    const places = [
      // Residences / birthplace
      {
        name: '上海', lat: 31.2304, lng: 121.4737,
        country: '中国', firstVisitDate: '',
        notes: '出生地，爸爸妈妈定居',
        category: 'home'
      },
      {
        name: '潍坊大家洼', lat: 36.8970, lng: 118.9966,
        country: '中国', firstVisitDate: '',
        notes: '妈妈老家',
        category: 'home'
      },
      // Domestic travel
      {
        name: '青岛', lat: 36.0671, lng: 120.3826,
        country: '中国', firstVisitDate: '2025',
        notes: '2025年旅行',
        category: 'domestic'
      },
      {
        name: '海阳辛安镇', lat: 36.7428, lng: 121.2469,
        country: '中国', firstVisitDate: '',
        notes: '姥爷老家',
        category: 'domestic'
      },
      {
        name: '潍坊', lat: 36.7059, lng: 119.1616,
        country: '中国', firstVisitDate: '',
        notes: '姨姥姥',
        category: 'domestic'
      },
      {
        name: '泗水', lat: 35.6413, lng: 117.2514,
        country: '中国', firstVisitDate: '',
        notes: '爸爸家',
        category: 'domestic'
      },
      {
        name: '广州', lat: 23.1291, lng: 113.2644,
        country: '中国', firstVisitDate: '2025',
        notes: '2025年旅行',
        category: 'domestic'
      },
      {
        name: '香港', lat: 22.3193, lng: 114.1694,
        country: '中国', firstVisitDate: '2024',
        notes: '2024–2025年旅行',
        category: 'domestic'
      },
      {
        name: '三亚', lat: 18.2524, lng: 109.5118,
        country: '中国', firstVisitDate: '2026',
        notes: '2026年旅行',
        category: 'domestic'
      },
      {
        name: '福州', lat: 26.0745, lng: 119.2965,
        country: '中国', firstVisitDate: '2026',
        notes: '2026年旅行',
        category: 'domestic'
      },
      {
        name: '南京', lat: 32.0584, lng: 118.7965,
        country: '中国', firstVisitDate: '2024',
        notes: '2024年旅行',
        category: 'domestic'
      },
      {
        name: '杭州', lat: 30.2741, lng: 120.1551,
        country: '中国', firstVisitDate: '',
        notes: '旅行',
        category: 'domestic'
      },
      {
        name: '苏州', lat: 31.2983, lng: 120.5832,
        country: '中国', firstVisitDate: '',
        notes: '旅行',
        category: 'domestic'
      }
    ];

    const categoryLabels = { home: '居住地', domestic: '国内旅行' };

    places.forEach(p => {
      const icon = makeIcon(COLORS[p.category]);
      const marker = L.marker([p.lat, p.lng], { icon }).addTo(map);
      const dateRow = p.firstVisitDate
        ? `<div class="popup-row"><span class="popup-label">首访：</span><span>${p.firstVisitDate}</span></div>`
        : '';
      const notesRow = p.notes
        ? `<div class="popup-row"><span class="popup-label">备注：</span><span>${p.notes}</span></div>`
        : '';
      marker.bindPopup(`
        <div class="popup-wrap">
          <div class="popup-title">${p.name}</div>
          <div class="popup-row"><span class="popup-label">国家/地区：</span><span>${p.country}</span></div>
          ${dateRow}
          ${notesRow}
          <div class="popup-category" style="color:${COLORS[p.category]}">● ${categoryLabels[p.category]}</div>
        </div>
      `);
    });
  </script>
</body>
</html>
